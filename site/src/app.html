<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			// Theme boot — runs before any rendering to avoid FOUC.
			// Resolves `light` | `dark` | `auto` from localStorage and sets
			// data-theme on <html> + the CSS color-scheme so native form
			// controls + scrollbars adopt the right palette immediately.
			(function () {
				try {
					var raw = localStorage.getItem('ohbm2026.ui.theme.v1');
					var choice = raw === 'light' || raw === 'dark' || raw === 'auto' ? raw : 'auto';
					var effective =
						choice === 'auto'
							? window.matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light'
							: choice;
					document.documentElement.setAttribute('data-theme', effective);
					document.documentElement.style.colorScheme = effective;
				} catch (e) {
					// localStorage might be unavailable; default to system pref.
					document.documentElement.setAttribute(
						'data-theme',
						window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
					);
				}
			})();
		</script>
		<!-- Google tag (gtag.js) — measurement id G-5LQ42EDHPF.
		     Gated to skip PR-preview deployments so we don't pollute the
		     production analytics with bot + reviewer traffic. PR previews
		     live under /pr-<N>/ on the same gh-pages host; production is
		     the bare-root + /ohbm2026/ + /neuroscape/ subpaths. -->
		<script>
			(function () {
				try {
					var p = window.location.pathname || '';
					if (/^\/pr-\d+\//.test(p)) return;
				} catch (e) {
					return;
				}
				var s = document.createElement('script');
				s.async = true;
				s.src = 'https://www.googletagmanager.com/gtag/js?id=G-5LQ42EDHPF';
				document.head.appendChild(s);
				window.dataLayer = window.dataLayer || [];
				function gtag() { window.dataLayer.push(arguments); }
				window.gtag = gtag;
				gtag('js', new Date());
				gtag('config', 'G-5LQ42EDHPF');
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
